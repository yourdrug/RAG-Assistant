services:
  qdrant:
    image: qdrant/qdrant:latest
    hostname: qdrant
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    hostname: ollama
    container_name: rag-ollama
    ports:
      - "11435:11434"
    volumes:
      - ./data/ollama_models:/root/.ollama
    environment:
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_KEEP_ALIVE: 5m
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 14G
        reservations:
          cpus: "2"
          memory: 4G
  # Раскомментировать если есть NVIDIA GPU:
  #       devices:
  #         - driver: nvidia
  #           count: 1
  #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11434' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    container_name: rag-postgres
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    expose: ["5432/tcp"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
    volumes:
      - ./data/db/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./data/db/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    image: ghcr.io/yourdrug/rag-assistant:${IMAGE_TAG:-latest}
    hostname: rag-server
    container_name: rag-server
    ports:
      - "8001:8001"
    env_file:
      - path: server/.env
        required: true
    volumes:
      - type: bind
        source: data
        target: /code/project/data
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G
        reservations:
          cpus: "1"
          memory: 4G
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    hostname: caddy
    container_name: rag-caddy
    profiles: ["domain"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-myapp.rag}
      ACME_EMAIL: ${ACME_EMAIL:-postmaster@myapp.rag}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: rag-network
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: ${DOCKER_MTU:-1500}
