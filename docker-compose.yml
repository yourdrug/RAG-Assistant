services:
  qdrant:
    image: qdrant/qdrant:latest
    hostname: qdrant
    container_name: rag-qdrant
    ports:
      - "127.0.0.1:6333:6333"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?Установи QDRANT_API_KEY в .env — openssl rand -hex 24}
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    hostname: ollama
    container_name: rag-ollama
    # Ollama не умеет в собственную авторизацию — единственная реальная защита это не
    # публиковать порт за пределы хоста. 127.0.0.1: оставляет локальную отладку рабочей
    # (ollama ls/run на самой машине), но закрывает доступ по сети.
    ports:
      - "127.0.0.1:11435:11434"
    volumes:
      - ./data/ollama_models:/root/.ollama
    environment:
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_KEEP_ALIVE: 5m   # не держать модель в памяти бесконечно после запроса
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 14G
        reservations:
          cpus: "2"
          memory: 4G
  # Раскомментировать если есть NVIDIA GPU:
  #       devices:
  #         - driver: nvidia
  #           count: 1
  #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11434' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    container_name: rag-postgres
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    expose: ["5432/tcp"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
    volumes:
      - ./data/db/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./data/db/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    hostname: rag-server
    container_name: rag-server
    entrypoint: ["./entrypoint.sh"]
    command: ["python", "main.py", "runserver", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    ports:
      - "8001:8001"
    env_file:
      - path: server/.env
        required: true
    volumes:
      - type: bind
        source: server/app
        target: /code/project/app
      - type: bind
        source: server/entrypoint.sh
        target: /code/project/entrypoint.sh
        read_only: true
      - type: bind
        source: data
        target: /code/project/data
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G
        reservations:
          cpus: "1"
          memory: 4G
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: rag-minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Установи MINIO_ROOT_USER в .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Установи MINIO_ROOT_PASSWORD в .env — openssl rand -hex 24}
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    hostname: caddy
    container_name: rag-caddy
    profiles: ["domain"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-myapp.rag}
      ACME_EMAIL: ${ACME_EMAIL:-postmaster@myapp.rag}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_certs:/etc/caddy/certs:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: rag-network
    driver: bridge
    driver_opts:
      # По умолчанию Docker-мост держит MTU=1500. Если на хосте поднят VPN (обычно
      # снижает MTU до ~1400 и меньше), крупные TLS-пакеты при долгих скачиваниях рвутся
      # с "EOF" — см. README → Troubleshooting.
      com.docker.network.driver.mtu: ${DOCKER_MTU:-1500}

volumes:
  huggingface_cache: