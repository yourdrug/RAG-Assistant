version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    hostname: qdrant
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11435:11434"
    volumes:
      - ./ollama_models:/root/.ollama
    environment:
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_PARALLEL: 1
      # Не держать модель бесконечно в памяти после запроса
      # 5 минут достаточно для RAG
      OLLAMA_KEEP_ALIVE: 5m

    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 20G
        reservations:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11434' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Раскомментировать если есть NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    container_name: rag-postgres
    command: [ "postgres", "-c", "config_file=/etc/postgresql/postgresql.conf" ]
    expose: [ "5432/tcp" ]
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword   # для прод-окружения — смени и здесь, и в server/.env (DATABASE_URL)
    volumes:
      - ./db/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./db/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    hostname: rag-server
    container_name: rag-server
    entrypoint: ["./entrypoint.sh"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    ports:
      - "8001:8001"
    env_file:
      - path: server/.env
        required: true
    volumes:
      - type: bind
        source: server/app
        target: /code/project/app
        read_only: false
        bind:
          propagation: rprivate
          create_host_path: false
          selinux: Z
      - type: bind
        source: server/entrypoint.sh
        target: /code/project/entrypoint.sh
        read_only: true
        bind:
          propagation: rprivate
          create_host_path: false
          selinux: Z
      - type: bind
        source: docs_sample
        target: /code/project/docs
        read_only: true
        bind:
          propagation: rprivate
          create_host_path: false
          selinux: Z
      - type: bind
        source: ./models/bge-m3
        target: /models/bge-m3
        read_only: true
      - type: bind
        source: ./models/bge-reranker-v2-m3
        target: /models/bge-reranker-v2-m3
        read_only: true
    healthcheck:
      test: [ "CMD", "curl", "--silent", "--fail", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G
        reservations:
          cpus: "1"
          memory: 4G
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: rag-network
    driver: bridge
    driver_opts:
      # По умолчанию Docker-мост держит MTU=1500. Если на хосте поднят VPN (обычно
      # снижает MTU до ~1400 и меньше), крупные TLS-пакеты при долгих скачиваниях рвутся
      # с "EOF" — см. README → Troubleshooting.
      com.docker.network.driver.mtu: ${DOCKER_MTU:-1500}