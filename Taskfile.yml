version: "3"

vars:
  COMPOSE: docker compose

dotenv: ["server/.env"]

tasks:

  default:
    desc: Показать список доступных команд
    cmds:
      - task --list

  # -------------------------------------------------------------------------
  # Первый запуск
  # -------------------------------------------------------------------------

  init:
    desc: Первоначальная настройка — .env файлы + права на data/ + сборка образа
    cmds:
      - task: env
      - task: data:perms
      - task: build
      - 'echo "Готово. Дальше:  task up  →  task pull-model  →  task login email=... password=...  →  task ingest  →  task chat -- \"вопрос\""'
      - 'echo "Свой домен вместо localhost:8001?  task up:public  (нужен DOMAIN в .env — см. README)"'
      - 'echo "(Для локальной разработки/тестов вне Docker: task install)"'

  env:
    desc: Создать .env и server/.env из соответствующих .env.example, если ещё не созданы
    status:
      - test -f .env
      - test -f server/.env
    cmds:
      - test -f .env || cp .env.example .env
      - test -f server/.env || cp server/.env.example server/.env
      - 'echo ".env и server/.env готовы"'

  data:perms:
    desc: "Права на data/ для записи любым UID контейнера (нужно для task prod:up / production-стадии)"
    cmds:
      - mkdir -p data
      - chmod -R a+rwX data
      - 'echo "data/ доступна на запись"'

  # -------------------------------------------------------------------------
  # Docker-стек
  # -------------------------------------------------------------------------

  build:
    desc: Собрать образ server (после изменений в Dockerfile / pyproject.toml)
    cmds:
      - "{{.COMPOSE}} build server"

  up:
    desc: Поднять весь стек (qdrant, ollama, postgres, server) в фоне — без Caddy/домена
    cmds:
      - "{{.COMPOSE}} up -d"
      - task: ps

  up:public:
    desc: "То же + Caddy с авто-HTTPS на своём домене (нужен DOMAIN в .env — см. README)"
    cmds:
      - "{{.COMPOSE}} --profile domain up -d"
      - task: ps

  down:
    desc: Остановить и удалить контейнеры, включая Caddy если был поднят (данные в data/ сохраняются)
    cmds:
      - "{{.COMPOSE}} --profile domain down"

  restart:
    desc: "Перезапустить сервис (task restart -- server)"
    cmds:
      - "{{.COMPOSE}} restart {{.CLI_ARGS | default \"server\"}}"

  # -------------------------------------------------------------------------
  # Продакшн — прекомпилированный образ из GHCR, без сборки из исходников.
  # Публикуется .github/workflows/release.yml. См. README → «Прекомпилированные образы».
  # -------------------------------------------------------------------------

  prod:pull:
    desc: Скачать готовый образ server из GHCR (вместо сборки из исходников)
    cmds:
      - docker compose -f docker-compose.prod.yml pull server

  prod:up:
    desc: Поднять стек из готового образа (после prod:pull) — без Caddy/домена
    cmds:
      - docker compose -f docker-compose.prod.yml up -d
      - docker compose -f docker-compose.prod.yml ps

  prod:up:public:
    desc: То же + Caddy с авто-HTTPS (нужен DOMAIN в .env)
    cmds:
      - docker compose -f docker-compose.prod.yml --profile domain up -d
      - docker compose -f docker-compose.prod.yml ps

  prod:down:
    desc: Остановить prod-стек (данные в data/ сохраняются)
    cmds:
      - docker compose -f docker-compose.prod.yml --profile domain down

  ps:
    desc: Статус контейнеров
    cmds:
      - "{{.COMPOSE}} ps"

  logs:
    desc: "Логи сервиса, по умолчанию server (task logs -- postgres)"
    cmds:
      - "{{.COMPOSE}} logs -f {{.CLI_ARGS | default \"server\"}}"

  clean:
    desc: Остановить стек и удалить data/postgres, data/qdrant_storage, data/ollama_models, data/caddy_* — ОПАСНО
    prompt: Удалить все локальные данные (Postgres/Qdrant/Ollama/Caddy)?
    cmds:
      - "{{.COMPOSE}} --profile domain down -v"
      - rm -rf data/postgres data/qdrant_storage data/ollama_models data/caddy_data data/caddy_config

  # -------------------------------------------------------------------------
  # Модель LLM (Ollama — сервис в docker-compose.yml)
  # -------------------------------------------------------------------------

  pull-model:
    desc: Скачать LLM в контейнер Ollama (по умолчанию — модель из server/.env / LLM_MODEL)
    cmds:
      - "{{.COMPOSE}} exec ollama ollama pull {{.CLI_ARGS | default \"qwen2.5:14b\"}}"

  # -------------------------------------------------------------------------
  # Авторизация
  # -------------------------------------------------------------------------

  login:
    desc: "Залогиниться и сохранить токен в .auth_token (task login email=admin@example.com password=...)"
    cmds:
      - >
        curl -sX POST http://localhost:8001/auth/login
        -H "Content-Type: application/json"
        -d "{\"email\": \"{{.email}}\", \"password\": \"{{.password}}\"}"
        -o /tmp/rag_login_response.json
      - cat /tmp/rag_login_response.json | jq .
      - jq -er .access_token /tmp/rag_login_response.json > .auth_token
      - 'echo "Токен сохранён в .auth_token — остальные task-команды подхватят его сами"'

  me:
    desc: Показать текущего авторизованного пользователя
    cmds:
      - >
        curl -s http://localhost:8001/auth/me
        -H "Authorization: Bearer $(cat .auth_token)" | jq .

  user:add:
    desc: "[admin] Завести пользователя (task user:add email=vasya@company.com password=... role=user)"
    cmds:
      - >
        curl -sX POST http://localhost:8001/auth/users
        -H "Authorization: Bearer $(cat .auth_token)"
        -H "Content-Type: application/json"
        -d "{\"email\": \"{{.email}}\", \"password\": \"{{.password}}\", \"role\": \"{{.role | default `user`}}\"}" | jq .

  user:list:
    desc: "[admin] Список всех пользователей"
    cmds:
      - >
        curl -s http://localhost:8001/auth/users
        -H "Authorization: Bearer $(cat .auth_token)" | jq .

  # -------------------------------------------------------------------------
  # Индексация документов (только admin — нужен токен из task login)
  # -------------------------------------------------------------------------

  ingest:
    desc: "[admin] Проиндексировать data/docs_sample/ (только новые/изменённые файлы)"
    cmds:
      - >
        curl -sX POST "http://localhost:8001/ingest?reset=false"
        -H "Authorization: Bearer $(cat .auth_token)" | jq .

  ingest:reset:
    desc: "[admin] Полная переиндексация data/docs_sample/ с нуля"
    cmds:
      - >
        curl -sX POST "http://localhost:8001/ingest?reset=true"
        -H "Authorization: Bearer $(cat .auth_token)" | jq .

  ingest:file:
    desc: "[admin] Проиндексировать один файл (task ingest:file -- /code/project/data/docs_sample/report.pdf)"
    cmds:
      - >
        curl -sX POST "http://localhost:8001/ingest/file?file_path={{.CLI_ARGS}}"
        -H "Authorization: Bearer $(cat .auth_token)" | jq .

  ingest:list:
    desc: "[admin] Реестр уже проиндексированных файлов"
    cmds:
      - >
        curl -s http://localhost:8001/ingest/registry
        -H "Authorization: Bearer $(cat .auth_token)" | jq .

  # -------------------------------------------------------------------------
  # Проверка и использование
  # -------------------------------------------------------------------------

  health:
    desc: Проверить статус всех сервисов через /health (без авторизации)
    cmds:
      - curl -s http://localhost:8001/health | jq .

  chat:
    desc: "Задать вопрос синхронно, нужен предварительный task login (task chat -- \"Твой вопрос\")"
    cmds:
      - >
        curl -sX POST http://localhost:8001/chat/sync
        -H "Authorization: Bearer $(cat .auth_token)"
        -H "Content-Type: application/json"
        -d "{\"question\": \"{{.CLI_ARGS}}\"}" | jq .

  bench:
    desc: Запустить оценку качества (retriever + LLM-судья) по data/test_questions.json
    dir: server
    cmds:
      - DATA_DIR=../data uv run python app/benchmark.py

  # -------------------------------------------------------------------------
  # База данных
  # -------------------------------------------------------------------------

  db:shell:
    desc: Открыть psql внутри контейнера postgres
    cmds:
      - "{{.COMPOSE}} exec postgres psql -U raguser -d ragdb"

  db:backup:
    desc: Сделать дамп БД в data/db/postgres/backups/
    cmds:
      - mkdir -p data/db/postgres/backups
      - "{{.COMPOSE}} exec -T postgres pg_dump -U raguser ragdb > data/db/postgres/backups/backup_$(date +%F_%H%M%S).sql"
      - 'echo "Дамп сохранён в data/db/postgres/backups/"'

  # -------------------------------------------------------------------------
  # Локальная разработка без Docker (uv)
  # -------------------------------------------------------------------------

  install:
    desc: "Установить зависимости локально через uv (основные + dev: pytest, ruff)"
    dir: server
    cmds:
      - uv sync --frozen

  install:surya:
    desc: Доустановить опциональный OCR-движок Surya (см. README → «Лицензии»)
    dir: server
    cmds:
      - uv sync --frozen --extra surya

  lock:
    desc: Пересобрать uv.lock после правки pyproject.toml
    dir: server
    cmds:
      - uv lock

  fmt:
    desc: Отформатировать и подчистить код (ruff)
    dir: server
    cmds:
      - uv run ruff format app tests
      - uv run ruff check --fix app tests

  lint:
    desc: Проверить код линтером без изменений
    dir: server
    cmds:
      - uv run ruff check app tests

  test:
    desc: Прогнать unit-тесты (pytest)
    dir: server
    cmds:
      - uv run pytest -v