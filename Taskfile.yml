version: "3"

vars:
  COMPOSE: docker compose

dotenv: ["server/.env"]

tasks:

  default:
    desc: Показать список доступных команд
    cmds:
      - task --list

  # -------------------------------------------------------------------------
  # Первый запуск
  # -------------------------------------------------------------------------

  init:
    desc: Первоначальная настройка — .env файлы + сборка образа
    cmds:
      - task: env
      - task: build
      - 'echo "Готово. Дальше:  task up  →  task pull-model  →  task ingest  →  task chat"'
      - 'echo "(Для локальной разработки/тестов вне Docker: task install)"'

  env:
    desc: Создать .env и server/.env из соответствующих .env.example, если ещё не созданы
    status:
      - test -f .env
      - test -f server/.env
    cmds:
      - test -f .env || cp .env.example .env
      - test -f server/.env || cp server/.env.example server/.env
      - 'echo ".env и server/.env готовы"'

  # -------------------------------------------------------------------------
  # Docker-стек
  # -------------------------------------------------------------------------

  build:
    desc: Собрать образ server (после изменений в Dockerfile / pyproject.toml)
    cmds:
      - "{{.COMPOSE}} build server"

  up:
    desc: Поднять весь стек (qdrant, postgres, server) в фоне
    cmds:
      - "{{.COMPOSE}} up -d"
      - task: ps

  down:
    desc: Остановить и удалить контейнеры (данные в .data/ сохраняются)
    cmds:
      - "{{.COMPOSE}} down"

  restart:
    desc: "Перезапустить сервис (task restart -- server)"
    cmds:
      - "{{.COMPOSE}} restart {{.CLI_ARGS | default \"server\"}}"

  ps:
    desc: Статус контейнеров
    cmds:
      - "{{.COMPOSE}} ps"

  logs:
    desc: "Логи сервиса, по умолчанию server (task logs -- postgres)"
    cmds:
      - "{{.COMPOSE}} logs -f {{.CLI_ARGS | default \"server\"}}"

  clean:
    desc: Остановить стек и удалить .data/ (все данные Qdrant/Postgres) — ОПАСНО
    prompt: Удалить все локальные данные (.data/)?
    cmds:
      - "{{.COMPOSE}} down -v"
      - rm -rf .data

  # -------------------------------------------------------------------------
  # Модели Ollama
  # -------------------------------------------------------------------------

  pull-model:
    desc: Скачать LLM в контейнер Ollama (по умолчанию — модель из .env / LLM_MODEL)
    cmds:
      - "{{.COMPOSE}} exec ollama ollama pull {{.CLI_ARGS | default .LLM_MODEL | default \"qwen2.5:14b\"}}"

  # -------------------------------------------------------------------------
  # Индексация документов
  # -------------------------------------------------------------------------

  ingest:
    desc: Проиндексировать docs_sample/ (только новые/изменённые файлы)
    cmds:
      - curl -sX POST "http://localhost:8000/ingest?docs_dir=/app/docs&reset=false" | jq .

  ingest:reset:
    desc: Полная переиндексация docs_sample/ с нуля
    cmds:
      - curl -sX POST "http://localhost:8000/ingest?docs_dir=/app/docs&reset=true" | jq .

  ingest:file:
    desc: "Проиндексировать один файл (task ingest:file -- /app/docs/report.pdf)"
    cmds:
      - curl -sX POST "http://localhost:8000/ingest/file?file_path={{.CLI_ARGS}}" | jq .

  # -------------------------------------------------------------------------
  # Проверка и использование
  # -------------------------------------------------------------------------

  health:
    desc: Проверить статус всех сервисов через /health
    cmds:
      - curl -s http://localhost:8000/health | jq .

  chat:
    desc: "Задать вопрос синхронно (task chat -- \"Твой вопрос\")"
    cmds:
      - >
        curl -sX POST http://localhost:8000/chat/sync
        -H "Content-Type: application/json"
        -d "{\"question\": \"{{.CLI_ARGS}}\"}" | jq .

  bench:
    desc: Запустить оценку качества (retriever + LLM-судья) по test_questions.json
    dir: server
    cmds:
      - uv run python app/benchmark.py --questions app/test_questions.json

  # -------------------------------------------------------------------------
  # База данных
  # -------------------------------------------------------------------------

  db:shell:
    desc: Открыть psql внутри контейнера postgres
    cmds:
      - "{{.COMPOSE}} exec postgres psql -U raguser -d ragdb"

  db:backup:
    desc: Сделать дамп БД в db/postgres/backups/
    cmds:
      - mkdir -p db/postgres/backups
      - "{{.COMPOSE}} exec -T postgres pg_dump -U raguser ragdb > db/postgres/backups/backup_$(date +%F_%H%M%S).sql"
      - 'echo "Дамп сохранён в db/postgres/backups/"'

  # -------------------------------------------------------------------------
  # Локальная разработка без Docker (uv)
  # -------------------------------------------------------------------------

  install:
    desc: "Установить зависимости локально через uv (основные + dev: pytest, ruff)"
    dir: server
    cmds:
      - uv sync --frozen

  install:surya:
    desc: Доустановить опциональный OCR-движок Surya (см. README → «Лицензии»)
    dir: server
    cmds:
      - uv sync --frozen --extra surya

  lock:
    desc: Пересобрать uv.lock после правки pyproject.toml
    dir: server
    cmds:
      - uv lock

  fmt:
    desc: Отформатировать и подчистить код (ruff)
    dir: server
    cmds:
      - uv run ruff format app tests
      - uv run ruff check --fix app tests

  lint:
    desc: Проверить код линтером без изменений
    dir: server
    cmds:
      - uv run ruff check app tests

  test:
    desc: Прогнать unit-тесты (pytest)
    dir: server
    cmds:
      - uv run pytest -v