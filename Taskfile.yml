version: "3"

vars:
  COMPOSE: docker compose
  API_DIR: api

dotenv: [".env"]

tasks:

  default:
    desc: Показать список доступных команд
    cmds:
      - task --list

  # -------------------------------------------------------------------------
  # Первый запуск
  # -------------------------------------------------------------------------

  init:
    desc: Первоначальная настройка — .env + venv + сборка образов
    cmds:
      - task: env
      - task: install
      - task: build
      - 'echo "Готово. Дальше:  task up  →  task ingest  →  task chat"'

  env:
    desc: Создать .env из .env.example, если ещё не создан
    status:
      - test -f .env
    cmds:
      - cp .env.example .env
      - 'echo ".env создан из .env.example — при желании поправь пароли/модели"'

  # -------------------------------------------------------------------------
  # Python-окружение (uv)
  # -------------------------------------------------------------------------

  install:
    desc: Установить Python-зависимости локально через uv (для разработки/тестов вне Docker)
    dir: "{{.API_DIR}}"
    cmds:
      - uv sync --frozen

  install:surya:
    desc: Доустановить опциональный OCR-движок Surya (см. README → «Лицензии»)
    dir: "{{.API_DIR}}"
    cmds:
      - uv sync --frozen --extra surya

  lock:
    desc: Пересобрать uv.lock после правки pyproject.toml
    dir: "{{.API_DIR}}"
    cmds:
      - uv lock

  fmt:
    desc: Отформатировать и подчистить код (ruff)
    dir: "{{.API_DIR}}"
    cmds:
      - uv run ruff format .
      - uv run ruff check --fix .

  lint:
    desc: Проверить код линтером без изменений
    dir: "{{.API_DIR}}"
    cmds:
      - uv run ruff check .

  test:
    desc: Прогнать unit-тесты (pytest)
    dir: "{{.API_DIR}}"
    cmds:
      - uv run pytest -v

  # -------------------------------------------------------------------------
  # Docker-стек
  # -------------------------------------------------------------------------

  build:
    desc: Собрать образ api (после изменений в Dockerfile / pyproject.toml)
    cmds:
      - "{{.COMPOSE}} build api"

  up:
    desc: Поднять весь стек (qdrant, ollama, postgres, api) в фоне
    cmds:
      - "{{.COMPOSE}} up -d"
      - task: ps

  down:
    desc: Остановить и удалить контейнеры (данные в volume'ах сохраняются)
    cmds:
      - "{{.COMPOSE}} down"

  restart:
    desc: "Перезапустить сервис (task restart -- api)"
    cmds:
      - "{{.COMPOSE}} restart {{.CLI_ARGS | default \"api\"}}"

  ps:
    desc: Статус контейнеров
    cmds:
      - "{{.COMPOSE}} ps"

  logs:
    desc: "Логи сервиса, по умолчанию api (task logs -- postgres)"
    cmds:
      - "{{.COMPOSE}} logs -f {{.CLI_ARGS | default \"api\"}}"

  clean:
    desc: Остановить стек и удалить volume'ы с данными (Qdrant/Postgres/Ollama) — ОПАСНО
    prompt: Удалить все локальные данные (qdrant_storage, db/postgres/data, ollama_models)?
    cmds:
      - "{{.COMPOSE}} down -v"
      - rm -rf qdrant_storage ollama_models db/postgres/data

  # -------------------------------------------------------------------------
  # Модели Ollama
  # -------------------------------------------------------------------------

  pull-model:
    desc: Скачать LLM в контейнер Ollama (по умолчанию — модель из .env / LLM_MODEL)
    cmds:
      - "{{.COMPOSE}} exec ollama ollama pull {{.CLI_ARGS | default .LLM_MODEL | default \"qwen2.5:14b\"}}"

  # -------------------------------------------------------------------------
  # Индексация документов
  # -------------------------------------------------------------------------

  ingest:
    desc: Проиндексировать docs_sample/ (только новые/изменённые файлы)
    cmds:
      - curl -sX POST "http://localhost:8000/ingest?docs_dir=/app/docs&reset=false" | jq .
      - task: logs

  ingest:reset:
    desc: Полная переиндексация docs_sample/ с нуля
    cmds:
      - curl -sX POST "http://localhost:8000/ingest?docs_dir=/app/docs&reset=true" | jq .
      - task: logs

  ingest:file:
    desc: "Проиндексировать один файл (task ingest:file -- /app/docs/report.pdf)"
    cmds:
      - curl -sX POST "http://localhost:8000/ingest/file?file_path={{.CLI_ARGS}}" | jq .

  ingest:list:
    desc: Показать реестр уже проиндексированных файлов
    dir: "{{.API_DIR}}"
    cmds:
      - "{{.COMPOSE}} exec api uv run python ingestion.py --list"

  # -------------------------------------------------------------------------
  # Проверка и использование
  # -------------------------------------------------------------------------

  health:
    desc: Проверить статус всех сервисов через /health
    cmds:
      - curl -s http://localhost:8000/health | jq .

  chat:
    desc: "Задать вопрос синхронно (task chat -- \"Твой вопрос\")"
    cmds:
      - >
        curl -sX POST http://localhost:8000/chat/sync
        -H "Content-Type: application/json"
        -d "{\"question\": \"{{.CLI_ARGS}}\"}" | jq .

  bench:
    desc: Запустить оценку качества (retriever + LLM-судья) по test_questions.json
    dir: "{{.API_DIR}}"
    cmds:
      - uv run python benchmark.py --questions test_questions.json

  # -------------------------------------------------------------------------
  # База данных
  # -------------------------------------------------------------------------

  db:shell:
    desc: Открыть psql внутри контейнера postgres
    cmds:
      - "{{.COMPOSE}} exec postgres psql -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"

  db:backup:
    desc: Сделать дамп БД в db/postgres/backup_<дата>.sql
    cmds:
      - mkdir -p db/postgres/backups
      - "{{.COMPOSE}} exec -T postgres pg_dump -U ${POSTGRES_USER:-raguser} ${POSTGRES_DB:-ragdb} > db/postgres/backups/backup_$(date +%F_%H%M%S).sql"
      - 'echo "Дамп сохранён в db/postgres/backups/"'
