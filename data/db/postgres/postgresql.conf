# Слушать все интерфейсы внутри контейнера (доступ снаружи всё равно только через
# опубликованный порт/docker-сеть)
listen_addresses = '*'

port = 5432

# Настройки ниже — консервативные дефолты для локальной разработки на одной машине,
# где Postgres — не единственный тяжёлый процесс (рядом qdrant, LLM, OCR).
# Для прод-окружения на отдельном сервере пересчитай под доступную RAM
# (shared_buffers ~= 25% RAM, effective_cache_size ~= 50-75% RAM).
shared_buffers = 256MB
effective_cache_size = 768MB
wal_buffers = 16MB
max_wal_size = 1GB
min_wal_size = 80MB

# История диалогов — это не критичные для целостности при сбое питания данные,
# поэтому синхронный commit можно отключить ради скорости записи
synchronous_commit = off

autovacuum_naptime = 5min
autovacuum_max_workers = 3
